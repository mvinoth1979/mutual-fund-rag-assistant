name: Daily Mutual Fund Ingestion & Deployment

on:
  schedule:
    - cron: '30 4 * * *'  # 10:00 AM IST
  workflow_dispatch:      # Manual trigger

jobs:
  ingest_and_validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }} # Required for pushing updates

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Phase 0 Ingestion
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Orchestrate phase 0 steps
          python phase_0_ingestion/0.1_fetch/fetcher.py
          python phase_0_ingestion/0.2_extract/extractor.py
          python phase_0_ingestion/0.3_clean_normalize/normalizer.py
          python phase_0_ingestion/0.4_chunk/chunker.py
          python phase_0_ingestion/0.5_embed_index/embedder.py
          python phase_0_ingestion/0.6_validate_audit/validator.py

      - name: Run Integrity Tests (Phases 1-6)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Start temp server and run regression suite
          python verify_phase_0_5.py
          python verify_phase_1_to_5.py

      - name: Commit Updated Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ facts.db chroma_db/
          git commit -m "Automated Ingestion: Updated fund data [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git push origin main
